<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>功稀のページ</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;700&family=Noto+Sans+JP:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f0f; --surface: #181818; --surface2: #202020;
  --border: #2a2a2a; --border2: #333;
  --accent: #c8a96e; --accent2: #e8c98e;
  --text: #e8e0d4; --muted: #6a6058; --muted2: #8a7868;
  --red: #c06060; --green: #6a9e7a; --blue: #6080a8;
  --radius: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

/* LOADING */
#loading-screen {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  z-index: 9999; flex-direction: column; gap: 16px;
}
.loading-logo { font-family: 'Shippori Mincho', serif; font-size: 3rem; color: var(--accent); letter-spacing: 0.15em; text-shadow: 0 0 40px rgba(200,169,110,0.3); animation: pulse 1.5s ease-in-out infinite; }
.loading-text { font-size: 0.78rem; color: var(--muted2); letter-spacing: 0.2em; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* LOGIN */
#login-screen {
  position: fixed; inset: 0; background: var(--bg);
  display: none; align-items: center; justify-content: center; z-index: 9998;
  background-image: radial-gradient(ellipse at 30% 20%, rgba(200,169,110,0.05) 0%, transparent 60%),
                    radial-gradient(ellipse at 70% 80%, rgba(200,169,110,0.03) 0%, transparent 50%);
}
.login-box { width: 90%; max-width: 340px; text-align: center; }
.login-logo { font-family: 'Shippori Mincho', serif; font-size: 3rem; color: var(--accent); letter-spacing: 0.15em; margin-bottom: 6px; text-shadow: 0 0 40px rgba(200,169,110,0.3); }
.login-sub { font-size: 0.78rem; color: var(--muted2); letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 40px; }
.login-section-label { font-size: 0.72rem; color: var(--muted); letter-spacing: 0.1em; margin-bottom: 10px; text-align: left; }
.login-input-wrap { position: relative; margin-bottom: 10px; }
.login-input { width: 100%; padding: 15px 50px 15px 18px; background: var(--surface); border: 1px solid var(--border2); border-radius: var(--radius); color: var(--text); font-family: 'DM Mono', monospace; font-size: 1rem; letter-spacing: 0.15em; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
.login-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(200,169,110,0.1); }
.toggle-pw { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--muted2); cursor: pointer; font-size: 1rem; padding: 4px; }
.login-btn { width: 100%; padding: 14px; background: var(--accent); color: #0f0f0f; border: none; border-radius: var(--radius); font-family: 'Shippori Mincho', serif; font-size: 1rem; font-weight: 700; letter-spacing: 0.1em; cursor: pointer; transition: all 0.2s; margin-bottom: 6px; }
.login-btn:hover { background: var(--accent2); transform: translateY(-1px); }
.divider { display: flex; align-items: center; gap: 10px; margin: 16px 0; color: var(--muted); font-size: 0.75rem; }
.divider::before,.divider::after { content: ''; flex: 1; height: 1px; background: var(--border2); }
.google-btn { width: 100%; padding: 13px; background: var(--surface2); color: var(--text); border: 1px solid var(--border2); border-radius: var(--radius); font-family: 'Noto Sans JP', sans-serif; font-size: 0.9rem; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px; }
.google-btn:hover { border-color: var(--accent); background: var(--surface); }
.google-icon { width: 18px; height: 18px; background: conic-gradient(from 90deg at 50% 50%, #4285F4 0deg, #EA4335 90deg, #FBBC05 180deg, #34A853 270deg, #4285F4 360deg); border-radius: 50%; flex-shrink: 0; }
.login-error { color: var(--red); font-size: 0.8rem; margin-top: 10px; min-height: 18px; }
.login-attempts { font-size: 0.72rem; color: var(--muted); margin-top: 6px; }
.sync-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 0.72rem; color: var(--green); background: rgba(106,158,122,0.1); border: 1px solid rgba(106,158,122,0.3); border-radius: 20px; padding: 3px 10px; margin-top: 10px; }

/* MAIN */
#main-screen { display: none; }
header { position: sticky; top: 0; z-index: 100; background: rgba(15,15,15,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 0 16px; display: flex; align-items: center; justify-content: space-between; height: 56px; gap: 8px; }
.header-title { font-family: 'Shippori Mincho', serif; font-size: 1.1rem; color: var(--accent); letter-spacing: 0.1em; flex-shrink: 0; }
.header-center { display: flex; align-items: center; gap: 8px; flex: 1; justify-content: center; }
.header-date { font-size: 0.72rem; color: var(--muted2); font-family: 'DM Mono', monospace; }
.sync-status { font-size: 0.65rem; padding: 2px 8px; border-radius: 10px; border: 1px solid transparent; transition: all 0.3s; }
.sync-status.synced { color: var(--green); border-color: rgba(106,158,122,0.3); background: rgba(106,158,122,0.08); }
.sync-status.syncing { color: var(--accent); border-color: rgba(200,169,110,0.3); background: rgba(200,169,110,0.08); animation: pulse 1s infinite; }
.sync-status.offline { color: var(--muted2); border-color: var(--border2); }
.user-avatar { width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--border2); flex-shrink: 0; }
.logout-btn { background: none; border: 1px solid var(--border2); color: var(--muted2); padding: 5px 10px; border-radius: 8px; font-size: 0.72rem; cursor: pointer; transition: all 0.2s; font-family: 'Noto Sans JP', sans-serif; flex-shrink: 0; }
.logout-btn:hover { border-color: var(--accent); color: var(--accent); }

/* TABS */
.tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; }
.tabs::-webkit-scrollbar { display: none; }
.tab { flex: 1; min-width: 68px; padding: 13px 6px; text-align: center; font-size: 0.76rem; color: var(--muted2); cursor: pointer; transition: all 0.2s; border: none; background: none; white-space: nowrap; border-bottom: 2px solid transparent; font-family: 'Noto Sans JP', sans-serif; }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab:hover:not(.active) { color: var(--text); }

/* PANELS */
.panel { display: none; padding: 20px 16px; min-height: calc(100vh - 110px); }
.panel.active { display: block; }
.sec-title { font-family: 'Shippori Mincho', serif; font-size: 1rem; color: var(--accent); letter-spacing: 0.1em; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
.sec-title::after { content:''; flex:1; height:1px; background:linear-gradient(to right,var(--border2),transparent); }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }

/* WEATHER */
.weather-main { display:flex; align-items:center; gap:16px; margin-bottom:16px; }
.weather-icon { font-size:3rem; }
.weather-temp { font-family:'DM Mono',monospace; font-size:2.5rem; color:var(--accent); font-weight:500; }
.weather-desc { font-size:0.85rem; color:var(--muted2); margin-top:2px; }
.weather-location { font-size:0.75rem; color:var(--muted); }
.weather-details { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
.weather-detail { background:var(--surface2); border-radius:8px; padding:10px; text-align:center; }
.weather-detail .label { font-size:0.68rem; color:var(--muted); margin-bottom:4px; }
.weather-detail .value { font-size:0.9rem; font-family:'DM Mono',monospace; }
.weather-loading { color:var(--muted2); font-size:0.9rem; text-align:center; padding:20px; }
.today-row { display:flex; align-items:center; justify-content:space-between; padding:10px 0; border-bottom:1px solid var(--border); font-size:0.88rem; }
.today-row:last-child { border-bottom:none; }
.today-row .k { color:var(--muted2); font-size:0.78rem; }
.today-row .v { color:var(--text); font-family:'DM Mono',monospace; }

/* TODO */
.todo-add { display:flex; gap:8px; margin-bottom:16px; }
.todo-add input { flex:1; background:var(--surface); border:1px solid var(--border2); border-radius:10px; padding:11px 14px; color:var(--text); font-family:'Noto Sans JP',sans-serif; font-size:0.9rem; outline:none; transition:border-color 0.2s; }
.todo-add input:focus { border-color:var(--accent); }
.todo-add input::placeholder { color:var(--muted); }
.btn-icon { width:42px; height:42px; background:var(--accent); border:none; border-radius:10px; color:#0f0f0f; font-size:1.2rem; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.2s; flex-shrink:0; }
.btn-icon:hover { background:var(--accent2); }
.todo-filters { display:flex; gap:6px; margin-bottom:14px; }
.filter-btn { padding:5px 12px; border:1px solid var(--border2); background:none; border-radius:20px; font-size:0.75rem; color:var(--muted2); cursor:pointer; transition:all 0.2s; font-family:'Noto Sans JP',sans-serif; }
.filter-btn.active { border-color:var(--accent); color:var(--accent); background:rgba(200,169,110,0.08); }
.todo-item { display:flex; align-items:center; gap:10px; padding:12px 14px; background:var(--surface); border:1px solid var(--border); border-radius:10px; margin-bottom:8px; animation:fadeIn 0.2s ease; }
.todo-item.done { opacity:0.45; }
.todo-check { width:20px; height:20px; border:1.5px solid var(--border2); border-radius:6px; cursor:pointer; flex-shrink:0; display:flex; align-items:center; justify-content:center; transition:all 0.2s; font-size:0.7rem; background:none; }
.todo-check.checked { background:var(--accent); border-color:var(--accent); color:#0f0f0f; }
.todo-text { flex:1; font-size:0.9rem; line-height:1.4; }
.todo-item.done .todo-text { text-decoration:line-through; color:var(--muted); }
.todo-del { background:none; border:none; color:var(--muted); cursor:pointer; font-size:0.85rem; padding:4px; border-radius:6px; transition:color 0.15s; }
.todo-del:hover { color:var(--red); }
.todo-priority { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
.pri-high { background:var(--red); } .pri-mid { background:var(--accent); } .pri-low { background:var(--muted); }

/* MEMO */
.memo-tabs { display:flex; gap:6px; margin-bottom:14px; flex-wrap:wrap; }
.memo-tab-btn { padding:5px 14px; border:1px solid var(--border2); background:none; border-radius:20px; font-size:0.8rem; color:var(--muted2); cursor:pointer; transition:all 0.2s; font-family:'Noto Sans JP',sans-serif; }
.memo-tab-btn.active { border-color:var(--accent); color:var(--accent); background:rgba(200,169,110,0.08); }
.memo-editor { width:100%; min-height:200px; background:var(--surface); border:1px solid var(--border2); border-radius:var(--radius); padding:14px; color:var(--text); font-family:'Noto Sans JP',sans-serif; font-size:0.9rem; line-height:1.7; resize:vertical; outline:none; transition:border-color 0.2s; }
.memo-editor:focus { border-color:var(--accent); }
.memo-toolbar { display:flex; align-items:center; justify-content:space-between; margin-top:8px; }
.memo-saved { font-size:0.72rem; color:var(--muted); }
.memo-add-btn { padding:6px 14px; border:1px dashed var(--border2); background:none; border-radius:8px; font-size:0.78rem; color:var(--muted2); cursor:pointer; transition:all 0.2s; font-family:'Noto Sans JP',sans-serif; }
.memo-add-btn:hover { border-color:var(--accent); color:var(--accent); }

/* CALENDAR */
.cal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
.cal-nav { background:none; border:1px solid var(--border2); color:var(--muted2); padding:7px 14px; border-radius:8px; cursor:pointer; font-size:1rem; transition:all 0.2s; }
.cal-nav:hover { border-color:var(--accent); color:var(--accent); }
.cal-month { font-family:'Shippori Mincho',serif; font-size:1.1rem; color:var(--text); letter-spacing:0.08em; }
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; margin-bottom:20px; }
.cal-dname { text-align:center; font-size:0.7rem; color:var(--muted); padding:4px 0; }
.cal-dname:first-child { color:#c06060; } .cal-dname:last-child { color:var(--blue); }
.cal-day { aspect-ratio:1; display:flex; flex-direction:column; align-items:center; justify-content:center; border-radius:8px; cursor:pointer; font-size:0.82rem; position:relative; transition:all 0.15s; }
.cal-day:hover:not(.empty) { background:var(--surface2); }
.cal-day.today { background:rgba(200,169,110,0.15); color:var(--accent); font-weight:700; border:1px solid rgba(200,169,110,0.3); }
.cal-day.sunday { color:#c06060; } .cal-day.saturday { color:var(--blue); }
.cal-day.today.sunday,.cal-day.today.saturday { color:var(--accent); }
.cal-day.has-event::after { content:''; width:4px; height:4px; background:var(--accent); border-radius:50%; position:absolute; bottom:2px; }
.event-item { display:flex; align-items:center; gap:10px; padding:12px 14px; background:var(--surface); border:1px solid var(--border); border-left:3px solid var(--accent); border-radius:10px; margin-bottom:8px; animation:fadeIn 0.2s ease; }
.event-date { font-size:0.72rem; color:var(--muted2); font-family:'DM Mono',monospace; }
.event-title-text { font-size:0.9rem; }
.event-del { background:none; border:none; color:var(--muted); cursor:pointer; font-size:0.85rem; margin-left:auto; padding:4px; transition:color 0.15s; }
.event-del:hover { color:var(--red); }
.add-event-form { background:var(--surface2); border:1px solid var(--border2); border-radius:var(--radius); padding:14px; margin-top:10px; display:none; flex-direction:column; gap:8px; }
.add-event-form.open { display:flex; }
.add-event-form input { background:var(--surface); border:1px solid var(--border2); border-radius:8px; padding:10px 12px; color:var(--text); font-family:'Noto Sans JP',sans-serif; font-size:0.88rem; outline:none; transition:border-color 0.2s; }
.add-event-form input:focus { border-color:var(--accent); }
.form-btns { display:flex; gap:8px; }
.save-btn { flex:1; padding:9px; background:var(--accent); color:#0f0f0f; border:none; border-radius:8px; font-family:'Shippori Mincho',serif; font-size:0.9rem; cursor:pointer; transition:background 0.2s; }
.save-btn:hover { background:var(--accent2); }
.cancel-btn { padding:9px 14px; background:none; border:1px solid var(--border2); color:var(--muted2); border-radius:8px; font-size:0.85rem; cursor:pointer; transition:all 0.2s; font-family:'Noto Sans JP',sans-serif; }
.cancel-btn:hover { border-color:var(--muted2); color:var(--text); }
.add-ev-btn { width:100%; padding:11px; border:1px dashed var(--border2); background:none; border-radius:10px; color:var(--muted2); font-size:0.85rem; cursor:pointer; transition:all 0.2s; margin-top:8px; font-family:'Noto Sans JP',sans-serif; }
.add-ev-btn:hover { border-color:var(--accent); color:var(--accent); }

/* TIMER */
.timer-display { text-align:center; padding:30px 20px; }
.timer-clock { font-family:'DM Mono',monospace; font-size:4rem; color:var(--accent); letter-spacing:0.05em; text-shadow:0 0 40px rgba(200,169,110,0.2); margin-bottom:24px; }
.timer-presets { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; margin-bottom:20px; }
.preset-btn { padding:9px 6px; background:var(--surface2); border:1px solid var(--border); border-radius:8px; color:var(--muted2); font-size:0.8rem; cursor:pointer; transition:all 0.2s; font-family:'DM Mono',monospace; }
.preset-btn:hover { border-color:var(--accent); color:var(--accent); }
.timer-btns { display:flex; justify-content:center; gap:10px; }
.timer-btn { padding:10px 24px; border-radius:10px; border:1px solid var(--border2); background:var(--surface); color:var(--text); font-family:'Shippori Mincho',serif; font-size:0.95rem; cursor:pointer; transition:all 0.2s; }
.timer-btn.start { background:var(--accent); color:#0f0f0f; border-color:var(--accent); }
.timer-btn:hover { opacity:0.85; transform:translateY(-1px); }
.reminder-add { display:flex; flex-direction:column; gap:8px; margin-bottom:16px; }
.reminder-add input,.rem-dt { background:var(--surface); border:1px solid var(--border2); border-radius:10px; padding:10px 14px; color:var(--text); font-family:'Noto Sans JP',sans-serif; font-size:0.88rem; outline:none; transition:border-color 0.2s; width:100%; }
.reminder-add input:focus,.rem-dt:focus { border-color:var(--accent); }
.reminder-row { display:flex; gap:8px; }
.reminder-item { display:flex; align-items:center; gap:10px; padding:12px 14px; background:var(--surface); border:1px solid var(--border); border-radius:10px; margin-bottom:8px; animation:fadeIn 0.2s ease; }
.reminder-time { font-family:'DM Mono',monospace; font-size:0.85rem; color:var(--accent); min-width:80px; }
.reminder-text { flex:1; font-size:0.88rem; }
.reminder-del { background:none; border:none; color:var(--muted); cursor:pointer; font-size:0.85rem; transition:color 0.15s; }
.reminder-del:hover { color:var(--red); }

.empty { text-align:center; padding:32px 16px; color:var(--muted); font-size:0.85rem; }
.empty-icon { font-size:2rem; display:block; margin-bottom:8px; opacity:0.5; }

/* CHAT */
.msg { max-width: 78%; animation: fadeIn 0.2s ease; }
.msg.me { align-self: flex-end; }
.msg.other { align-self: flex-start; }
.msg-name { font-size:0.68rem; color:var(--muted2); margin-bottom:3px; padding:0 4px; }
.msg.me .msg-name { text-align:right; }
.msg-bubble { padding:10px 14px; border-radius:18px; font-size:0.9rem; line-height:1.5; word-break:break-word; }
.msg.me .msg-bubble { background:var(--accent); color:#0f0f0f; border-bottom-right-radius:4px; }
.msg.other .msg-bubble { background:var(--surface2); color:var(--text); border-bottom-left-radius:4px; border:1px solid var(--border); }
.msg-time { font-size:0.65rem; color:var(--muted); margin-top:3px; padding:0 4px; font-family:'DM Mono',monospace; }
.msg.me .msg-time { text-align:right; }
.msg.other .msg-time { text-align:left; }
@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
::-webkit-scrollbar { width:4px; } ::-webkit-scrollbar-track { background:transparent; } ::-webkit-scrollbar-thumb { background:var(--border2); border-radius:4px; }
</style>
</head>
<body>

<div id="loading-screen">
  <div class="loading-logo">功稀</div>
  <div class="loading-text">LOADING...</div>
</div>

<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">功稀</div>
    <div class="login-sub">Personal Dashboard</div>
    <div class="login-section-label">— パスワードでログイン —</div>
    <div class="login-input-wrap">
      <input type="password" class="login-input" id="pw-input" placeholder="パスワードを入力"
        autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
      <button class="toggle-pw" onclick="togglePw()">👁</button>
    </div>
    <button class="login-btn" onclick="doLogin()">ログイン</button>
    <div class="divider">または</div>
    <button class="google-btn" onclick="doGoogleLogin()">
      <div class="google-icon"></div>Googleアカウントでログイン
    </button>
    <div style="text-align:center"><span class="sync-badge">☁️ クラウド同期対応</span></div>
    <div class="login-error" id="login-error"></div>
    <div class="login-attempts" id="login-attempts"></div>
  </div>
</div>

<div id="main-screen">
  <header>
    <div class="header-title">功稀のページ</div>
    <div class="header-center">
      <div class="header-date" id="header-date"></div>
      <div class="sync-status synced" id="sync-status">同期済み</div>
    </div>
    <img class="user-avatar" id="user-avatar" src="" alt="" style="display:none">
    <button class="logout-btn" onclick="doLogout()">ログアウト</button>
  </header>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('today')" id="tab-today">🌤 今日</button>
    <button class="tab" onclick="switchTab('todo')" id="tab-todo">✅ ToDo</button>
    <button class="tab" onclick="switchTab('memo')" id="tab-memo">📝 メモ</button>
    <button class="tab" onclick="switchTab('calendar')" id="tab-calendar">📅 予定</button>
    <button class="tab" onclick="switchTab('timer')" id="tab-timer">⏱ タイマー</button>
    <button class="tab" onclick="switchTab('chat')" id="tab-chat">💬 家族</button>
  </div>

  <div class="panel active" id="today-panel">
    <div class="sec-title">天気</div>
    <div class="card" id="weather-card"><div class="weather-loading">📡 取得中...</div></div>
    <div class="sec-title">今日の情報</div>
    <div class="card" id="today-info"></div>
  </div>

  <div class="panel" id="todo-panel">
    <div class="sec-title">タスク</div>
    <div class="todo-add">
      <input type="text" id="todo-input" placeholder="新しいタスクを追加…" maxlength="60" onkeydown="if(event.key==='Enter')addTodo()">
      <select id="todo-pri" style="background:var(--surface);border:1px solid var(--border2);color:var(--muted2);border-radius:10px;padding:0 8px;font-size:0.78rem;outline:none;cursor:pointer;">
        <option value="mid">普通</option><option value="high">高</option><option value="low">低</option>
      </select>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";
import { getFirestore, doc, collection, setDoc, deleteDoc, onSnapshot }
  from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCq80mrMGtOcyoZcNXVmy_-ndIJk8_Gj5A",
  authDomain: "kouki-app.firebaseapp.com",
  projectId: "kouki-app",
  storageBucket: "kouki-app.firebasestorage.app",
  messagingSenderId: "69333134175",
  appId: "1:69333134175:web:e53210b75b2dc530a564ea"
};

const fbApp = initializeApp(firebaseConfig);
const auth = getAuth(fbApp);
const db = getFirestore(fbApp);
const provider = new GoogleAuthProvider();

// ─── Auth状態監視 ───
onAuthStateChanged(auth, (user) => {
  document.getElementById('loading-screen').style.display = 'none';
  if (user) {
    window._uid = user.uid;
    window._useFirestore = true;
    if (user.photoURL) {
      const av = document.getElementById('user-avatar');
      av.src = user.photoURL; av.style.display = 'block';
    }
    setupSync();
    showMainScreen();
  } else {
    window._uid = null;
    window._useFirestore = false;
    if (sessionStorage.getItem('kouki_session') === 'ok') {
      loadLocal(); showMainScreen();
    } else {
      document.getElementById('login-screen').style.display = 'flex';
    }
  }
});

// ─── Firestoreリアルタイム同期 ───
function setupSync() {
  const uid = window._uid;
  const setSS = (s) => {
    const el = document.getElementById('sync-status'); if(!el) return;
    el.className = 'sync-status ' + s;
    el.textContent = s==='synced'?'同期済み':s==='syncing'?'同期中...':'オフライン';
  };

  onSnapshot(collection(db,'users',uid,'todos'), snap => {
    window._todos = snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.ts||0)-(a.ts||0));
    if(typeof renderTodos==='function') renderTodos(); setSS('synced');
  }, ()=>setSS('offline'));

  onSnapshot(collection(db,'users',uid,'events'), snap => {
    window._events = snap.docs.map(d=>({id:d.id,...d.data()}));
    if(typeof renderCalendar==='function'){renderCalendar();renderEvents();} setSS('synced');
  }, ()=>setSS('offline'));

  onSnapshot(collection(db,'users',uid,'memos'), snap => {
    window._memos = snap.empty
      ? [{id:'memo1',title:'メモ 1',content:'',order:0}]
      : snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(a.order||0)-(b.order||0));
    if(typeof renderMemo==='function') renderMemo(); setSS('synced');
  }, ()=>setSS('offline'));

  onSnapshot(collection(db,'users',uid,'reminders'), snap => {
    window._reminders = snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(a.time||'').localeCompare(b.time||''));
    if(typeof renderReminders==='function') renderReminders(); setSS('synced');
  }, ()=>setSS('offline'));
}

// ─── Firestore書き込みヘルパー ───
window.fsSet = async (col, id, data) => {
  if(!window._useFirestore) return;
  document.getElementById('sync-status').className='sync-status syncing';
  document.getElementById('sync-status').textContent='同期中...';
  try { await setDoc(doc(db,'users',window._uid,col,id), data, {merge:true}); }
  catch(e) { console.error(e); }
};
window.fsDel = async (col, id) => {
  if(!window._useFirestore) return;
  try { await deleteDoc(doc(db,'users',window._uid,col,id)); }
  catch(e) { console.error(e); }
};

// ─── Googleログイン ───
window.doGoogleLogin = async () => {
  try { await signInWithPopup(auth, provider); }
  catch(e) { document.getElementById('login-error').textContent = 'Googleログインに失敗しました'; }
};

// ─── ログアウト ───
window.doLogout = async () => {
  if(window._useFirestore) { await signOut(auth); }
  else { sessionStorage.removeItem('kouki_session'); }
  window._uid=null; window._useFirestore=false;
  document.getElementById('main-screen').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('pw-input').value='';
  document.getElementById('login-error').textContent='';
  document.getElementById('user-avatar').style.display='none';
};
</script>

<script>
// ════ パスワード認証 ════
const HASH_KEY = 'kouki_pw_hash';
const WEEKDAYS = ['日','月','火','水','木','金','土'];

async function hashPw(pw) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pw+'kouki_salt_2024'));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
(async()=>{ if(!localStorage.getItem(HASH_KEY)) localStorage.setItem(HASH_KEY, await hashPw('13240622Ko')); })();

window.doLogin = async function() {
  const now = Date.now();
  const lockout = parseInt(localStorage.getItem('kouki_lockout')||'0');
  if(lockout && now < lockout) {
    document.getElementById('login-error').textContent = `🔒 ロックアウト中 (${Math.ceil((lockout-now)/1000)}秒後に再試行)`;
    return;
  }
  if(lockout && now >= lockout) { localStorage.removeItem('kouki_lockout'); localStorage.removeItem('kouki_attempts'); }
  const entered = await hashPw(document.getElementById('pw-input').value);
  if(entered === localStorage.getItem(HASH_KEY)) {
    localStorage.removeItem('kouki_attempts'); localStorage.removeItem('kouki_lockout');
    sessionStorage.setItem('kouki_session','ok');
    window._uid='local'; window._useFirestore=false;
    loadLocal(); showMainScreen();
  } else {
    const a = (parseInt(localStorage.getItem('kouki_attempts')||'0'))+1;
    localStorage.setItem('kouki_attempts',a);
    if(a>=5) { localStorage.setItem('kouki_lockout',now+300000); document.getElementById('login-error').textContent='🔒 5分間ロックアウトされました'; }
    else { document.getElementById('login-error').textContent='パスワードが違います'; document.getElementById('login-attempts').textContent=`残り ${5-a} 回`; }
    document.getElementById('pw-input').value='';
  }
};
window.togglePw = ()=>{ const i=document.getElementById('pw-input'); i.type=i.type==='password'?'text':'password'; };
setInterval(()=>{ const l=parseInt(localStorage.getItem('kouki_lockout')||'0'); if(l&&Date.now()<l) document.getElementById('login-error').textContent=`🔒 ロックアウト中 (${Math.ceil((l-Date.now())/1000)}秒後に再試行)`; },1000);

// ════ データ ════
window._todos=[]; window._events=[]; window._memos=[{id:'memo1',title:'メモ 1',content:'',order:0}]; window._reminders=[];

function loadLocal() {
  try{window._todos=JSON.parse(localStorage.getItem('kouki_todos'))||[];}catch{}
  try{window._events=JSON.parse(localStorage.getItem('kouki_events'))||[];}catch{}
  try{window._memos=JSON.parse(localStorage.getItem('kouki_memos'))||[{id:'memo1',title:'メモ 1',content:'',order:0}];}catch{}
  try{window._reminders=JSON.parse(localStorage.getItem('kouki_reminders'))||[];}catch{}
}
function saveLocal(k,v){ if(!window._useFirestore) localStorage.setItem(k,JSON.stringify(v)); }

// ════ MAIN ════
window.showMainScreen = function() {
  document.getElementById('login-screen').style.display='none';
  document.getElementById('main-screen').style.display='block';
  updateHeaderDate();
  loadWeather();
  renderTodayInfo();
  renderCalendar();
  renderEvents();
  renderMemo();
  renderTodos();
  renderReminders();
  setInterval(updateHeaderDate,60000);
  setInterval(checkReminders,30000);
};

window.switchTab = function(n) {
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));

function updateHeaderDate() {
  const d=new Date();
  const el=document.getElementById('header-date'); if(!el)return;
  el.textContent=`${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} (${WEEKDAYS[d.getDay()]})`;

function toDateStr(d){ return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }

// ════ WEATHER ════
async function loadWeather() {
  try {
    const r=await fetch('https://api.open-meteo.com/v1/forecast?latitude=35.9&longitude=139.3&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m,apparent_temperature&daily=temperature_2m_max,temperature_2m_min&timezone=Asia%2FTokyo&forecast_days=1');
    const d=await r.json(); const c=d.current; const dl=d.daily;
    document.getElementById('weather-card').innerHTML=`
      <div class="weather-main">
        <div class="weather-icon">${wIcon(c.weather_code)}</div>
        <div><div class="weather-temp">${Math.round(c.temperature_2m)}°</div>
          <div class="weather-desc">${wDesc(c.weather_code)}</div>
          <div class="weather-location">埼玉県大井</div></div>
      </div>
      <div class="weather-details">
        <div class="weather-detail"><div class="label">体感</div><div class="value">${Math.round(c.apparent_temperature)}°C</div></div>
        <div class="weather-detail"><div class="label">湿度</div><div class="value">${c.relative_humidity_2m}%</div></div>
        <div class="weather-detail"><div class="label">風速</div><div class="value">${c.wind_speed_10m}m/s</div></div>
        <div class="weather-detail"><div class="label">最高</div><div class="value">${Math.round(dl.temperature_2m_max[0])}°C</div></div>
        <div class="weather-detail"><div class="label">最低</div><div class="value">${Math.round(dl.temperature_2m_min[0])}°C</div></div>
        <div class="weather-detail"><div class="label">更新</div><div class="value" style="font-size:0.7rem">${new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'})}</div></div>
      </div>`;
  } catch{ document.getElementById('weather-card').innerHTML='<div class="weather-loading">取得できませんでした</div>'; }
}
function wIcon(c){if(c===0)return'☀️';if(c<=2)return'🌤️';if(c<=3)return'☁️';if(c<=49)return'🌫️';if(c<=59)return'🌧️';if(c<=69)return'🌨️';if(c<=79)return'❄️';if(c<=84)return'🌧️';if(c<=94)return'⛈️';return'🌩️';}
function wDesc(c){if(c===0)return'快晴';if(c<=2)return'晴れ時々曇り';if(c<=3)return'曇り';if(c<=49)return'霧';if(c<=59)return'小雨';if(c<=69)return'みぞれ';if(c<=79)return'雪';if(c<=84)return'雨';if(c<=94)return'雷雨';return'激しい雷雨';}

function renderTodayInfo() {
  const d=new Date(),y=d.getFullYear();
  const day=Math.floor((d-new Date(y,0,1))/86400000)+1;
  const el=document.getElementById('today-info'); if(!el)return;
  el.innerHTML=`
    <div class="today-row"><span class="k">今日</span><span class="v">${y}年${d.getMonth()+1}月${d.getDate()}日 (${WEEKDAYS[d.getDay()]})</span></div>
    <div class="today-row"><span class="k">今年の残り日数</span><span class="v">${366-day} 日</span></div>
    <div class="today-row"><span class="k">${d.getMonth()+1}月の残り</span><span class="v">${new Date(y,d.getMonth()+1,0).getDate()-d.getDate()} 日</span></div>
    <div class="today-row"><span class="k">今週</span><span class="v">${Math.ceil(d.getDate()/7)} 週目</span></div>`;

// ════ TODO ════
let todoFilter='all';
window.addTodo=function(){
  const inp=document.getElementById('todo-input'),text=inp.value.trim(); if(!text)return;
  const pri=document.getElementById('todo-pri').value;
  const id=Date.now().toString(),ts=Date.now();
  const item={id,text,done:false,pri,ts};
  window._todos.unshift(item);
  saveLocal('kouki_todos',window._todos);
  if(window._useFirestore) window.fsSet('todos',id,{text,done:false,pri,ts});
  inp.value=''; renderTodos();
};
window.setFilter=function(f,el){
  todoFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active')); el.classList.add('active'); renderTodos();
};
window.toggleTodo=function(id){
  const t=window._todos.find(t=>t.id===id); if(!t)return; t.done=!t.done;
  saveLocal('kouki_todos',window._todos);
  if(window._useFirestore) window.fsSet('todos',id,{done:t.done}); renderTodos();
};
window.deleteTodo=function(id){
  window._todos=window._todos.filter(t=>t.id!==id);
  saveLocal('kouki_todos',window._todos);
  if(window._useFirestore) window.fsDel('todos',id); renderTodos();
};
function renderTodos(){
  let todos=[...window._todos];
  if(todoFilter==='active')todos=todos.filter(t=>!t.done);
  if(todoFilter==='done')todos=todos.filter(t=>t.done);
  const list=document.getElementById('todo-list'); if(!list)return;
  if(!todos.length){list.innerHTML='<div class="empty"><span class="empty-icon">✅</span>タスクはありません</div>';return;}
  list.innerHTML=todos.map(t=>`
    <div class="todo-item ${t.done?'done':''}">
      <div class="todo-priority pri-${t.pri}"></div>
      <button class="todo-check ${t.done?'checked':''}" onclick="toggleTodo('${t.id}')">${t.done?'✓':''}</button>
      <span class="todo-text">${esc(t.text)}</span>
      <button class="todo-del" onclick="deleteTodo('${t.id}')">✕</button>
    </div>`).join('');
}

let curMemo=0, memoTimer;
window.addMemoPage=function(){
  const id='m'+Date.now(),order=window._memos.length;

window.switchMemoPage=function(i){

};
window.saveMemo=function(){
  const c=window._memos[curMemo]; if(!c)return;

  saveLocal('kouki_memos',window._memos);
  clearTimeout(memoTimer);

function renderMemo(){
  if(!window._memos.length)window._memos=[{id:'memo1',title:'メモ 1',content:'',order:0}];
  if(curMemo>=window._memos.length)curMemo=0;
  const te=document.getElementById('memo-tabs'); if(!te)return;

  document.getElementById('memo-saved').textContent='';

// ════ CALENDAR ════
let calYear=new Date().getFullYear(),calMonth=new Date().getMonth();
function renderCalendar(){
  const lbl=document.getElementById('cal-month-label'); if(!lbl)return;
  lbl.textContent=`${calYear}年 ${calMonth+1}月`;
  const grid=document.getElementById('cal-grid'); grid.innerHTML='';
  ['日','月','火','水','木','金','土'].forEach(d=>{const e=document.createElement('div');e.className='cal-dname';e.textContent=d;grid.appendChild(e);});
  const first=new Date(calYear,calMonth,1).getDay(),days=new Date(calYear,calMonth+1,0).getDate(),tStr=toDateStr(new Date());
  for(let i=0;i<first;i++){const e=document.createElement('div');e.className='cal-day empty';grid.appendChild(e);}
  for(let d=1;d<=days;d++){
    const ds=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow=new Date(calYear,calMonth,d).getDay();
    const e=document.createElement('div');
    let cls='cal-day';if(dow===0)cls+=' sunday';if(dow===6)cls+=' saturday';if(ds===tStr)cls+=' today';if(window._events.some(v=>v.date===ds))cls+=' has-event';
    e.className=cls;e.textContent=d;e.onclick=()=>{document.getElementById('ev-date').value=ds;toggleEventForm(true);};grid.appendChild(e);
  }
}
window.changeMonth=function(dir){calMonth+=dir;if(calMonth>11){calMonth=0;calYear++;}if(calMonth<0){calMonth=11;calYear--;}renderCalendar();renderEvents();};
function renderEvents(){
  const today=toDateStr(new Date()),up=window._events.filter(e=>e.date>=today).sort((a,b)=>a.date.localeCompare(b.date));
  const list=document.getElementById('event-list'); if(!list)return;
  if(!up.length){list.innerHTML='<div class="empty"><span class="empty-icon">📅</span>予定はありません</div>';return;}
  list.innerHTML=up.map(ev=>{const d=new Date(ev.date+'T00:00:00');return`<div class="event-item"><div><div class="event-date">${d.getMonth()+1}/${d.getDate()} (${WEEKDAYS[d.getDay()]})</div><div class="event-title-text">${esc(ev.title)}</div></div><button class="event-del" onclick="deleteEvent('${ev.id}')">✕</button></div>`;}).join('');
}
window.toggleEventForm=function(open){const f=document.getElementById('add-event-form');if(open===true)f.classList.add('open');else f.classList.toggle('open');if(f.classList.contains('open'))document.getElementById('ev-title').focus();};
window.addEvent=function(){
  const date=document.getElementById('ev-date').value,title=document.getElementById('ev-title').value.trim();
  if(!date||!title){alert('日付と内容を入力してください');return;}
  const id=Date.now().toString();
  window._events.push({id,date,title});
  saveLocal('kouki_events',window._events);
  if(window._useFirestore) window.fsSet('events',id,{date,title});
  document.getElementById('ev-date').value='';document.getElementById('ev-title').value='';
  document.getElementById('add-event-form').classList.remove('open');
  renderCalendar();renderEvents();
};
window.deleteEvent=function(id){
  if(!confirm('この予定を削除しますか？'))return;
  window._events=window._events.filter(e=>e.id!==id);
  saveLocal('kouki_events',window._events);
  if(window._useFirestore) window.fsDel('events',id);
  renderCalendar();renderEvents();
};

// ════ TIMER ════
let tSec=0,tRun=false,tInt=null,tInit=0;
window.setPreset=function(m){if(tRun)return;tSec=m*60;tInit=tSec;updTimer();};
window.toggleTimer=function(){
  if(tSec<=0&&!tRun)return;
  if(tRun){clearInterval(tInt);tRun=false;document.getElementById('timer-start-btn').textContent='再開';}
  else{tRun=true;document.getElementById('timer-start-btn').textContent='一時停止';tInt=setInterval(()=>{if(tSec>0){tSec--;updTimer();}else{clearInterval(tInt);tRun=false;document.getElementById('timer-start-btn').textContent='スタート';document.getElementById('timer-clock').textContent='00:00';alert('⏰ タイマー終了！');}},1000);}
};
window.resetTimer=function(){clearInterval(tInt);tRun=false;tSec=tInit;updTimer();document.getElementById('timer-start-btn').textContent='スタート';};
function updTimer(){const el=document.getElementById('timer-clock');if(el)el.textContent=`${String(Math.floor(tSec/60)).padStart(2,'0')}:${String(tSec%60).padStart(2,'0')}`;}

// ════ REMINDERS ════
window.addReminder=function(){
  const text=document.getElementById('rem-text').value.trim(),time=document.getElementById('rem-time').value;
  if(!text||!time){alert('内容と時刻を入力してください');return;}
  const id=Date.now().toString();
  window._reminders.push({id,text,time,notified:false});
  window._reminders.sort((a,b)=>(a.time||'').localeCompare(b.time||''));
  saveLocal('kouki_reminders',window._reminders);
  if(window._useFirestore) window.fsSet('reminders',id,{text,time,notified:false});
  document.getElementById('rem-text').value='';document.getElementById('rem-time').value='';
  renderReminders();
};
window.deleteReminder=function(id){
  window._reminders=window._reminders.filter(r=>r.id!==id);
  saveLocal('kouki_reminders',window._reminders);
  if(window._useFirestore) window.fsDel('reminders',id);
  renderReminders();
};
function renderReminders(){
  const list=document.getElementById('reminder-list'); if(!list)return;
  if(!window._reminders.length){list.innerHTML='<div class="empty"><span class="empty-icon">🔔</span>リマインダーはありません</div>';return;}
  list.innerHTML=window._reminders.map(r=>{const d=new Date(r.time);return`<div class="reminder-item"><span class="reminder-time">${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}</span><span class="reminder-text">${esc(r.text)}</span><button class="reminder-del" onclick="deleteReminder('${r.id}')">✕</button></div>`;}).join('');
}
function checkReminders(){
  const now=new Date();let chg=false;
  window._reminders.forEach(r=>{if(!r.notified&&new Date(r.time)<=now){alert(`🔔 リマインダー：${r.text}`);r.notified=true;chg=true;}});
  if(chg){saveLocal('kouki_reminders',window._reminders);renderReminders();}
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ════ 家族チャット ════
// 家族アプリと同じlocalStorageキーを使用してメッセージを共有
const CHAT_ROOM = 'family-default';
const CHAT_KEY = `fam_msgs_${CHAT_ROOM}`;
let chatLastCount = 0;
let chatPollInterval = null;

function getChatMsgs() {
  try { return JSON.parse(localStorage.getItem(CHAT_KEY)) || []; } catch { return []; }
}

window.sendChatMsg = function() {
  const inp = document.getElementById('chat-input');
  const text = inp.value.trim(); if (!text) return;
  const msgs = getChatMsgs();
  const t = new Date();
  const time = `${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}`;
  msgs.push({ name: '功稀', text, time, ts: Date.now() });
  localStorage.setItem(CHAT_KEY, JSON.stringify(msgs));
  inp.value = ''; inp.style.height = 'auto';
  renderChatMsgs();
  const c = document.getElementById('chat-messages');
  c.scrollTop = c.scrollHeight;
};

window.chatHandleKey = function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChatMsg(); }
};
window.chatAutoResize = function(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
};

function renderChatMsgs(isPolling = false) {
  const msgs = getChatMsgs();
  if (isPolling && msgs.length === chatLastCount) return;
  chatLastCount = msgs.length;
  const c = document.getElementById('chat-messages'); if (!c) return;
  const wasAtBottom = c.scrollHeight - c.scrollTop <= c.clientHeight + 50;
  c.innerHTML = '';
  if (!msgs.length) {
    c.innerHTML = '<div class="empty"><span class="empty-icon">💬</span>まだメッセージがありません</div>';
    return;
  }
  msgs.forEach(m => {
    const isMe = m.name === '功稀';
    const div = document.createElement('div');
    div.className = 'msg ' + (isMe ? 'me' : 'other');
    div.innerHTML = `
      <div class="msg-name">${esc(m.name)}</div>
      <div class="msg-bubble">${esc(m.text)}</div>
      <div class="msg-time">${m.time}</div>`;
    c.appendChild(div);
  });
  if (wasAtBottom || !isPolling) c.scrollTop = c.scrollHeight;
}

// タブ切り替え時にチャット初期化
const _origSwitchTab = window.switchTab;
window.switchTab = function(n) {
  _origSwitchTab(n);
  // チャットパネルの表示制御
  const cp = document.getElementById('chat-panel');
  if (cp) cp.style.display = n === 'chat' ? 'flex' : 'none';
  if (n === 'chat') {
    renderChatMsgs();
    const c = document.getElementById('chat-messages');
    if (c) c.scrollTop = c.scrollHeight;
    if (!chatPollInterval) chatPollInterval = setInterval(() => renderChatMsgs(true), 3000);
  } else {
    if (chatPollInterval) { clearInterval(chatPollInterval); chatPollInterval = null; }
  }
};

// ════ 家族アプリからインポート ════
window.importFamilyEvents = function() {
  const msg = document.getElementById('import-msg');
  const keys = Object.keys(localStorage).filter(k => k.startsWith('fam_events_'));
  if (keys.length === 0) {
    msg.style.color = 'var(--red)';
    msg.textContent = '⚠️ 家族アプリのデータが見つかりません。同じブラウザで家族アプリを開いてください。';
    return;
  }
  let allEvents = [];
  keys.forEach(k => {
    try { allEvents = allEvents.concat(JSON.parse(localStorage.getItem(k)) || []); } catch {}
  });
  if (allEvents.length === 0) {
    msg.style.color = 'var(--muted2)';
    msg.textContent = '家族アプリに予定データがありません。';
    return;
  }
  let added = 0;
  allEvents.forEach(ev => {
    if (!ev.date || !ev.title) return;
    const exists = window._events.some(e => e.date === ev.date && e.title === ev.title);
    if (!exists) {
      const id = 'imp_' + Date.now() + '_' + Math.random().toString(36).slice(2);
      const item = { id, date: ev.date, title: ev.title };
      window._events.push(item);
      saveLocal('kouki_events', window._events);
      if (window._useFirestore) window.fsSet('events', id, item);
      added++;
    }
  });
  if (added > 0) {
    msg.style.color = 'var(--green)';
    msg.textContent = `✅ ${added}件の予定をインポートしました！`;
    renderCalendar(); renderEvents();
  } else {
    msg.style.color = 'var(--muted2)';
    msg.textContent = '既に全ての予定がインポート済みです。';
  }
  setTimeout(() => { msg.textContent = ''; }, 4000);
};
</script>
